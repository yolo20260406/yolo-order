<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>LIFFテスト</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #06C755;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>YOLO LIFFテスト</h2>

        <input
            id="txt"
            placeholder="好きな文字を入力">

        <button onclick="send()">
            送信
        </button>

        <div id="result"></div>

    </div>


    <script>

        function send() {

            const text =
                document.getElementById("txt").value;

            document.getElementById("result")
                .innerHTML =
                "入力内容：" + text;

        }

    </script>

</body>

</html>
